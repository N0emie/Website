<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Турниры | Dizband Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2 class="admin-logo">Dizband Admin</h2>
      <nav class="admin-nav">
        <a href="/admin">Панель</a>
        <a href="/admin/media">Изображения</a>
        <a href="/admin/tournaments" class="active">Турниры</a>
        <a href="/admin/clients">Клиенты</a>
        <a href="/admin/achievements">Достижения</a>
      </nav>
      <button id="logoutBtn" class="secondary" style="margin-top:14px;">Выход</button>
    </aside>
    <main class="admin-main">
      <div class="card row" style="justify-content:space-between;align-items:center;">
        <div>
          <h1>Наши турниры</h1>
          <p class="muted">Добавляйте, редактируйте и удаляйте карточки.</p>
          <p class="muted">Перетаскивайте строки за ползунок слева — этот порядок сразу применяется на основном сайте.</p>
        </div>
        <a href="/admin/tournaments/new"><button>+ Новый турнир</button></a>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th style="width:40px;"></th>
              <th>ID</th>
              <th>Название</th>
              <th>Порядок</th>
              <th>Публикация</th>
              <th>Изображение</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/admin/admin.js"></script>
  <script>
    let draggedRow = null;

    function wireDnD(tbody) {
      const rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
      rows.forEach((row) => {
        row.draggable = true;
        row.addEventListener('dragstart', () => {
          draggedRow = row;
          row.classList.add('dragging');
        });
        row.addEventListener('dragend', () => {
          row.classList.remove('dragging');
          draggedRow = null;
        });
      });

      tbody.ondragover = (e) => {
        e.preventDefault();
        const target = e.target.closest('tr[data-id]');
        if (!draggedRow || !target || draggedRow === target) return;

        const rect = target.getBoundingClientRect();
        const before = e.clientY < rect.top + rect.height / 2;
        if (before) {
          tbody.insertBefore(draggedRow, target);
        } else {
          tbody.insertBefore(draggedRow, target.nextSibling);
        }
      };

      tbody.ondrop = async (e) => {
        e.preventDefault();
        if (!draggedRow) return;

        try {
          const orderIds = Array.from(tbody.querySelectorAll('tr[data-id]')).map((tr) => Number(tr.dataset.id));
          await AdminApp.api('/api/admin/tournaments', {
            method: 'PUT',
            body: { orderIds }
          });
          AdminApp.toast('Порядок сохранен');
          await render();
        } catch (err) {
          AdminApp.toast(err.message);
        }
      };
    }

    async function render() {
      await AdminApp.requireAuth();
      const { items } = await AdminApp.api('/api/admin/tournaments');
      const tbody = document.getElementById('rows');
      tbody.innerHTML = '';

      items.forEach((item) => {
        const tr = document.createElement('tr');
        tr.dataset.id = String(item.id);
        tr.innerHTML = `
          <td class="drag-handle-cell"><span class="drag-handle" title="Перетащить">||</span></td>
          <td>${item.id}</td>
          <td>${item.title}</td>
          <td>${item.ordering}</td>
          <td>${item.published ? 'Да' : 'Нет'}</td>
          <td>${item.image_url ? `<img class="thumb" src="${item.image_url}" alt="">` : ''}</td>
          <td>
            <a href="/admin/tournaments/${item.id}"><button class="secondary">Редактировать</button></a>
            <button class="danger" data-id="${item.id}">Удалить</button>
          </td>
        `;

        tr.querySelector('button.danger').addEventListener('click', async () => {
          if (!confirm('Удалить турнир?')) return;
          try {
            await AdminApp.api('/api/admin/tournaments', {
              method: 'DELETE',
              body: { id: item.id }
            });
            AdminApp.toast('Удалено');
            render();
          } catch (err) {
            AdminApp.toast(err.message);
          }
        });

        tbody.appendChild(tr);
      });

      wireDnD(tbody);
    }

    document.getElementById('logoutBtn').addEventListener('click', AdminApp.logout);
    render();
  </script>
</body>
</html>
