<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Новый турнир | Dizband Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2 class="admin-logo">Dizband Admin</h2>
      <nav class="admin-nav">
        <a href="/admin">Панель</a>
        <a href="/admin/media">Изображения</a>
        <a href="/admin/tournaments" class="active">Турниры</a>
        <a href="/admin/clients">Клиенты</a>
        <a href="/admin/achievements">Достижения</a>
      </nav>
      <button id="logoutBtn" class="secondary" style="margin-top:14px;">Выход</button>
    </aside>
    <main class="admin-main">
      <div class="card">
        <h1>Новый турнир</h1>
      </div>
      <form id="form" class="card stack">
        <div>
          <label>Название</label>
          <input id="title" required>
        </div>
        <div>
          <label>Краткое описание карточки</label>
          <textarea id="shortDescription" required></textarea>
        </div>
        <div class="row">
          <div style="flex:1;">
            <label>Сезон / дата</label>
            <input id="season">
          </div>
        </div>

        <div>
          <label>URL картинки</label>
          <input id="imageUrl">
        </div>
        <div>
          <label>Загрузить картинку</label>
          <input id="file" type="file" accept="image/png,image/jpeg,image/webp">
        </div>
        <div>
          <label>Растягивание картинки карточки</label>
          <select id="imageFit">
            <option value="cover" selected>Cover (заполнять блок)</option>
            <option value="contain">Contain (вписывать целиком)</option>
            <option value="fill">Fill (растянуть)</option>
          </select>
        </div>

        <div>
          <label>Подзаголовок окна</label>
          <input id="modalSubtitle" placeholder="ONLINE / MEDIA LEAGUA">
        </div>
        <div>
          <label>Описание окна (модалки)</label>
          <textarea id="modalDescription"></textarea>
        </div>
        <div>
          <label>URL картинки окна турнира</label>
          <input id="modalImageUrl">
        </div>
        <div>
          <label>Загрузить картинку окна турнира</label>
          <input id="modalFile" type="file" accept="image/png,image/jpeg,image/webp">
        </div>
        <div class="row">
          <div style="flex:1;">
            <label>Призовой фонд</label>
            <input id="prizePool" placeholder="1,200,000₽">
          </div>
          <div style="flex:1;">
            <label>Формат</label>
            <input id="tournamentFormat" placeholder="Online / LAN / Swiss">
          </div>
          <div style="flex:1;">
            <label>Команды</label>
            <input id="teams" placeholder="16 команд">
          </div>
        </div>

        <div>
          <label>Ссылка (опционально)</label>
          <input id="linkUrl">
        </div>
        <div>
          <label>Теги (через запятую)</label>
          <input id="tags">
        </div>
        <div>
          <label><input id="published" type="checkbox" checked style="width:auto;"> Опубликовано</label>
        </div>
        <div class="row">
          <button type="submit">Сохранить</button>
          <a href="/admin/tournaments"><button type="button" class="secondary">Отмена</button></a>
        </div>
      </form>
    </main>
  </div>

  <script src="/admin/admin.js"></script>
  <script>
    (async () => { await AdminApp.requireAuth(); })();
    document.getElementById('logoutBtn').addEventListener('click', AdminApp.logout);

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const file = document.getElementById('file').files[0];
        const imageUrlInput = document.getElementById('imageUrl');
        if (file) imageUrlInput.value = await AdminApp.uploadImage(file);
        if (!imageUrlInput.value.trim()) {
          throw new Error('Укажите URL картинки или загрузите файл');
        }

        const modalFile = document.getElementById('modalFile').files[0];
        const modalImageUrlInput = document.getElementById('modalImageUrl');
        if (modalFile) modalImageUrlInput.value = await AdminApp.uploadImage(modalFile);

        await AdminApp.api('/api/admin/tournaments', {
          method: 'POST',
          body: {
            title: document.getElementById('title').value.trim(),
            shortDescription: document.getElementById('shortDescription').value.trim(),
            season: document.getElementById('season').value.trim(),
            imageUrl: imageUrlInput.value.trim(),
            modalSubtitle: document.getElementById('modalSubtitle').value.trim(),
            modalDescription: document.getElementById('modalDescription').value.trim(),
            prizePool: document.getElementById('prizePool').value.trim(),
            tournamentFormat: document.getElementById('tournamentFormat').value.trim(),
            teams: document.getElementById('teams').value.trim(),
            modalImageUrl: modalImageUrlInput.value.trim(),
            imageFit: document.getElementById('imageFit').value,
            linkUrl: document.getElementById('linkUrl').value.trim(),
            tags: document.getElementById('tags').value.trim(),
            published: document.getElementById('published').checked
          }
        });

        AdminApp.toast('Создано');
        window.location.href = '/admin/tournaments';
      } catch (err) {
        AdminApp.toast(err.message);
      }
    });
  </script>
</body>
</html>
